name: RSS Recon

on:
  schedule:
    # 毎日、日本時間の午前9時（UTC 0:00）に自動実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手動で「出撃ボタン」を押せるようにする設定

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run RSS script
        run: python get_rss.py
